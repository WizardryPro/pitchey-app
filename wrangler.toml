# =====================================================
# Pitchey Production Configuration with Container Services
# Integrated deployment for existing production URLs
# =====================================================

# ===== MAIN WORKER CONFIGURATION =====
name = "pitchey-api-prod"
main = "src/worker-integrated.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat", "nodejs_als"]
account_id = "002bd5c0e90ae753a387c60546cf6869"

# Sentry version metadata for automatic release tracking
[version_metadata]
binding = "CF_VERSION_METADATA"

# Production domain routing (existing URLs) 
# Note: Using workers_dev = true instead of custom routes

# ===== CONTAINER SERVICES INTEGRATION =====
# Note: Container endpoints will be available at:
# https://pitchey-api-prod.ndlovucavelle.workers.dev/api/containers/*

# ===== DURABLE OBJECTS =====
[[durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

[[durable_objects.bindings]]
name = "WEBSOCKET_ROOMS"
class_name = "WebSocketRoom"

[[migrations]]
tag = "v3"
new_classes = ["NotificationHub", "WebSocketRoom"]

# ===== R2 STORAGE =====
[[r2_buckets]]
binding = "PITCH_STORAGE"
bucket_name = "pitchey-pitches"

[[r2_buckets]]
binding = "NDA_STORAGE"
bucket_name = "pitchey-ndas"

[[r2_buckets]]
binding = "MEDIA_STORAGE"
bucket_name = "pitchey-media"

[[r2_buckets]]
binding = "PROCESSED_STORAGE"
bucket_name = "pitchey-processed"

[[r2_buckets]]
binding = "TEMP_STORAGE"
bucket_name = "pitchey-temp"

# ===== KV NAMESPACES =====
[[kv_namespaces]]
binding = "CACHE"
id = "5e9e940dc8af4f159f1bd027f3687dd3"

[[kv_namespaces]]
binding = "SESSION_STORE"
id = "d98b6fc5d3f44a1a87ab229e113f4047"

[[kv_namespaces]]
binding = "RATE_LIMITER"
id = "cb9e5601b3444205875e1723fe543446"

[[kv_namespaces]]
binding = "JOB_STATUS"
id = "65f0c620465046139f73416abb3f3ecd"

[[kv_namespaces]]
binding = "CONTAINER_METRICS"
id = "55fd8288547e4d57a2abb8b2590444f8"

# ===== QUEUES — REMOVED (Cloud-3) =====
# 5 producers were declared but the main worker exports NO queue() consumer, so
# every send (only VIDEO_PROCESSING_QUEUE was ever called — on video upload) went
# into the void and dropped after retention. Producers removed until the
# video-processing pipeline is actually built (add the consumer + producer
# together). Code refs are guarded (`if (this.env.VIDEO_PROCESSING_QUEUE)`), so the
# binding's absence is a clean no-op.

# ===== ANALYTICS ENGINE =====
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "pitchey_metrics"

# CONTAINER_ANALYTICS / JOB_ANALYTICS removed 2026-04-17 — no writers in codebase.
# Re-add here if container-metrics / job-queue analytics are revived. See
# docs/observability-audit-2026-04-17.md for the audit rationale.

# Database Performance Analytics
[[analytics_engine_datasets]]
binding = "PITCHEY_ANALYTICS"
dataset = "pitchey_database_metrics"

# PITCHEY_PERFORMANCE / PITCHEY_ERRORS / TRACE_ANALYTICS removed 2026-04-17.
# Writers in `db/traced-operations.ts`, `services/database-metrics.service.ts`, and
# `services/trace-service.ts` guard on `if (env.XXX)`, so the pruning is safe —
# writes become no-ops. Readers were either absent or stub handlers returning empty.
# Sentry covers error tracking; Axiom covers request logs; AE remains for metrics only.
# See docs/observability-audit-2026-04-17.md.

# ===== TRACE WORKERS CONFIGURATION =====
# Note: Trace Workers API for distributed tracing
# Temporarily disabled due to experimental features
# [[unsafe.bindings]]
# name = "TRACE_WORKERS"
# type = "trace_workers"

# Trace Workers Service Binding - commented out for now
# [[services]]
# binding = "TRACE_SERVICE"
# service = "trace-worker"
# environment = "production"

# ===== AUDIT LOG STORAGE =====
[[r2_buckets]]
binding = "AUDIT_LOGS"
bucket_name = "pitchey-audit-logs"

[[r2_buckets]]
binding = "TRACE_LOGS"
bucket_name = "pitchey-trace-logs"

# ===== HYPERDRIVE — REMOVED (Cloud-4) =====
# The binding (id dec8d1ab675649c8b69d88cb4c160704) was bound but BYPASSED: the
# live DB path (WorkerDatabase + getDb) connects to env.DATABASE_URL directly and
# never touches env.HYPERDRIVE. It was pure credential-rotation footgun —
# Hyperdrive keeps its own copy of the Neon creds, so a Neon password rotation
# that forgot to also update Hyperdrive would 500 at the edge with no obvious
# cause. Removed. Code refs use `env.HYPERDRIVE?.connectionString || env.DATABASE_URL`
# so the fallback is clean; the orphan services/health-monitor.ts that called
# HYPERDRIVE.prepare() is dead code (not imported; live health is handlers/
# health-monitoring.ts on DATABASE_URL).
# CF resources still exist (unbinding neutralizes the footgun; deletion is the
# final cleanup — OWNER ACTION, an API delete is auto-denied):
#   wrangler hyperdrive delete dec8d1ab675649c8b69d88cb4c160704   (was bound)
#   wrangler hyperdrive delete bc2d846d32e64b5c8122654e4f12c959   (orphan pitchey-db)

# ===== CRON TRIGGERS =====
[triggers]
crons = [
  "*/5 * * * *",    # Every 5 min: Check NDA expirations (+ optional Neon keep-warm)
  "0 * * * *",      # Hourly: Send digest emails + money-path SLO check
  "0 0 * * *",      # Daily: Export audit logs and archive jobs
  "0 2 * * 1",      # Weekly: Database cleanup (Mondays at 2 AM)
  "0 3 * * *",      # Daily 3 AM: Stripe<->DB subscription reconciliation (drift detection)
  "*/15 * * * *"    # Every 15 min: Update trending algorithm
]

# ===== ENVIRONMENT VARIABLES =====
[vars]
# Platform Configuration
# Canonical user-facing URL since the 2026-07-01 domain cutover (apex 301s to www;
# pitchey-5o8.pages.dev remains the underlying Pages project + CI/health-check target).
FRONTEND_URL = "https://www.pitchey.com"
BACKEND_URL = "https://pitchey-api-prod.ndlovucavelle.workers.dev"
ENVIRONMENT = "production"
VERSION = "2.0-integrated"

# P3 keep-warm: when "true", the */5 cron pings Neon (SELECT 1) to close the
# 5-min autosuspend gap and cut the cold-start P99 tail. DEFAULT OFF — pins the
# compute ~24/7 (~+70 CU-hrs/mo on a shared org quota; see #65). Confirm Neon
# billing headroom before flipping to "true".
KEEP_WARM_DB = "false"

# Container Service Configuration
ENABLE_CONTAINERS = "true"
CONTAINER_ORCHESTRATION = "true"
CONTAINER_AUTO_SCALING = "true"
CONTAINER_HEALTH_MONITORING = "true"

# Processing Limits
MAX_VIDEO_PROCESSING_TIME = "1800"
MAX_DOCUMENT_PROCESSING_TIME = "300"
MAX_AI_INFERENCE_TIME = "120"
MAX_CODE_EXECUTION_TIME = "30"

# Feature Flags
ENABLE_DURABLE_OBJECTS = "true"
ENABLE_WEBSOCKETS = "true"
ENABLE_QUEUES = "true"
ENABLE_ANALYTICS = "true"
MAX_WEBSOCKET_CONNECTIONS = "100000"
CACHE_TTL = "300"

# Security Configuration
RATE_LIMITING_ENABLED = "true"
REQUEST_TIMEOUT_MS = "30000"
SANDBOX_EXECUTION = "true"

# Legacy Compatibility
REDIS_CACHE_ENABLED = "true"
ENABLE_EDGE_CACHING = "true"

# Authentication Configuration
BETTER_AUTH_URL = "https://pitchey-api-prod.ndlovucavelle.workers.dev"

# n8n Video Processing Webhook — DISABLED in prod (Cloud-2).
# This pointed at a dev-only localhost n8n instance, so queueVideoProcessing()
# await'd an unreachable fetch on every video upload (added latency + a captured
# Sentry error each time). multipart-upload.ts skips the webhook when this var is
# unset. Re-enable with a REAL deployed n8n URL when the video pipeline ships.
# N8N_WEBHOOK_URL = "http://localhost:5678/webhook/video-uploaded"

# Distributed Tracing Configuration
ENABLE_DISTRIBUTED_TRACING = "true"
TRACE_SAMPLING_RATE = "0.1"
TRACE_RETENTION_DAYS = "30"
ENABLE_AUDIT_LOGGING = "true"
AUDIT_LOG_RETENTION_DAYS = "90"
TRACE_CORRELATION_ENABLED = "true"

# Sentry Error Tracking
SENTRY_DSN = "https://fd5664ae577039ccb7cce31e91f54533@o4510137537396736.ingest.de.sentry.io/4510138308755536"
SENTRY_ENVIRONMENT = "production"
SENTRY_TRACES_SAMPLE_RATE = "0.1"

# Stripe (set via wrangler secret put)
# STRIPE_SECRET_KEY = "sk_live_..."
# STRIPE_WEBHOOK_SECRET = "whsec_..."

# Axiom Log Aggregation (set via wrangler secret)
# AXIOM_TOKEN = "your-axiom-api-token"
AXIOM_DATASET = "pitchey-logs"

# Observability Settings
LOG_LEVEL = "info"
SLOW_QUERY_THRESHOLD_MS = "1000"
LOG_ALL_QUERIES = "false"

# ===== OBSERVABILITY CONFIGURATION =====
[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1.0
invocation_logs = true
persist = true

[observability.traces]
enabled = true
head_sampling_rate = 0.1

# ===== TAIL WORKERS FOR TRACE PROCESSING =====
# Temporarily disabled - will configure after deployment
# [[tail_consumers]]
# service = "pitchey-api-prod"
# environment = "production"
# namespace = "pitchey-traces"
# script_name = "pitchey-trace-processor"

# Build Configuration
[build]
command = "npm run build:worker"