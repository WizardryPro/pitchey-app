name: Simple Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend
        id: frontend
        run: |
          if curl -f https://pitchey-5o8.pages.dev/ > /dev/null 2>&1; then
            echo "✅ Frontend is healthy"
          else
            echo "❌ Frontend is down"
            exit 1
          fi

      - name: Check API
        id: api
        run: |
          if curl -f https://pitchey-api-prod.ndlovucavelle.workers.dev/api/health > /dev/null 2>&1; then
            echo "✅ API is healthy"
          else
            echo "❌ API is down"
            exit 1
          fi

      # Red must have teeth — the previous version of this workflow failed silently,
      # with "failure surfaces in the Actions tab eventually" as the only escalation path.
      # Now: Slack on failure if SLACK_WEBHOOK is configured, GitHub issue as fallback.
      - name: Slack alert on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"🚨 Pitchey health check failed — run ${{ github.run_id }}. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK"

      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Health check failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `Automated health check failed at ${new Date().toISOString()}.`,
              ``,
              `Workflow: ${context.workflow}`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Auto-closed when next successful run completes.`,
            ].join('\n');

            // Deduplicate — don't open a new issue if an open one already exists.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check-failure',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing — run ${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health-check-failure', 'incident'],
            });
