name: Simple Health Check

on:
  workflow_dispatch:
  # 2026-05-02: re-enabled at 1hr cadence after the 2026-04-30 Neon-quota
  # outage (#65). 2026-06-30 (R6): tightened to every 15 min to cut Neon
  # compute-quota detection latency (the outage class that hit twice). Burn is
  # negligible — the per-service probe is one `SELECT NOW()` and the new
  # quota-headroom step is a Neon control-plane API call (no DB compute). See
  # docs/neon-quota-keepwarm-decision-2026-06-30.md.
  schedule:
    - cron: '*/15 * * * *'  # Every 15 min

permissions:
  contents: read
  # issues: write — the "Open GitHub issue on failure" step calls
  # github.rest.issues.create and .createComment. Without this scope those
  # 403 with "Resource not accessible by integration" on every failure,
  # silently defeating the alerting-with-teeth design.
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend
        id: frontend
        run: |
          # Retry transient blips (CDN hiccup, cold start, momentary 5xx) so a single
          # bad reading at the top of the hour doesn't page a false outage. A genuine
          # sustained outage still fails after all retries exhaust.
          if curl -f --retry 3 --retry-delay 2 --retry-all-errors --retry-connrefused --max-time 20 https://pitchey-5o8.pages.dev/ > /dev/null 2>&1; then
            echo "✅ Frontend is healthy"
          else
            echo "❌ Frontend is down"
            exit 1
          fi

      - name: Check API
        id: api
        run: |
          if curl -f --retry 3 --retry-delay 2 --retry-all-errors --retry-connrefused --max-time 20 https://pitchey-api-prod.ndlovucavelle.workers.dev/api/health > /dev/null 2>&1; then
            echo "✅ API is healthy"
          else
            echo "❌ API is down"
            exit 1
          fi

      # Proactive Neon compute-quota headroom (R6). The worker can't read Neon's
      # usage API (no NEON_API_KEY worker secret), so the BEFORE-exhaustion signal
      # lives here: a control-plane call (zero DB compute) that reads cpu_used_sec
      # vs the quota window. Fails (-> Slack + issue) at >= 85% IF a quota ceiling
      # is configured via the NEON_COMPUTE_QUOTA_SEC repo variable; otherwise it
      # logs cpu_used_sec for visibility without failing (no false page on an
      # unknown ceiling). The worker's reactive `neon_quota` service catches the
      # already-exhausted state via the per-service check below.
      - name: Check Neon compute-quota headroom
        id: neon_quota
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_COMPUTE_QUOTA_SEC: ${{ vars.NEON_COMPUTE_QUOTA_SEC }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "⚠️ NEON_API_KEY / NEON_PROJECT_ID not set — skipping quota headroom check"
            exit 0
          fi
          BODY="$(curl -fsS --retry 3 --retry-delay 2 --retry-all-errors --max-time 20 \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID")"
          RESULT="$(echo "$BODY" | python3 -c '
          import sys, json, os
          p = (json.load(sys.stdin).get("project") or {})
          used = p.get("cpu_used_sec")
          reset = p.get("quota_reset_at")
          ceiling = os.environ.get("NEON_COMPUTE_QUOTA_SEC")
          if used is None:
              print("SKIP cpu_used_sec absent from Neon API response"); sys.exit(0)
          if ceiling and ceiling.isdigit() and int(ceiling) > 0:
              pct = used / int(ceiling) * 100
              tag = "BAD" if pct >= 85 else "OK"
              print(f"{tag} cpu_used={used}s / {ceiling}s = {pct:.1f}% (resets {reset})")
          else:
              print(f"INFO cpu_used={used}s (no NEON_COMPUTE_QUOTA_SEC ceiling set; resets {reset})")
          ')"
          echo "$RESULT"
          case "$RESULT" in
            BAD*) echo "UNHEALTHY_SERVICES=neon_quota_headroom ($RESULT)" >> "$GITHUB_ENV"; exit 1 ;;
            *)    exit 0 ;;
          esac

      # Per-service check. `curl -f` above only proves /api/health returns 200 —
      # but it returns 200 even when a dependency is broken (the overall `status`
      # field stayed "ok" while email was "auth_error" after a stale Resend key,
      # so a dead-email outage failed SILENTLY). This inspects each service's
      # status and fails the job if any isn't healthy, which then fires the Slack
      # + GitHub-issue alerting below.
      - name: Check service statuses (email/db/redis/stripe/rateLimit)
        id: services
        run: |
          # Retry transport/5xx blips. A 200 carrying an unhealthy service status is NOT
          # retried (curl sees success) — those still fire immediately, as intended.
          BODY="$(curl -fsS --retry 3 --retry-delay 2 --retry-all-errors --retry-connrefused --max-time 20 https://pitchey-api-prod.ndlovucavelle.workers.dev/api/health)"
          BAD="$(echo "$BODY" | python3 -c '
          import sys, json
          services = (json.load(sys.stdin).get("data") or {}).get("services") or {}
          healthy = {"connected", "active", "ok", "healthy"}
          bad = []
          for name, info in services.items():
              st = info.get("status") if isinstance(info, dict) else info
              if st not in healthy:
                  bad.append(name + "=" + str(st))
          print(", ".join(bad))
          ')"
          if [ -n "$BAD" ]; then
            echo "❌ UNHEALTHY: $BAD"
            echo "UNHEALTHY_SERVICES=$BAD" >> "$GITHUB_ENV"
            exit 1
          fi
          echo "✅ All services healthy"

      # Red must have teeth — the previous version of this workflow failed silently,
      # with "failure surfaces in the Actions tab eventually" as the only escalation path.
      # Now: Slack on failure if SLACK_WEBHOOK is configured, GitHub issue as fallback.
      - name: Slack alert on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"🚨 Pitchey health check failed — ${{ env.UNHEALTHY_SERVICES || 'frontend/API unreachable' }} — run ${{ github.run_id }}. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK"

      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const unhealthy = process.env.UNHEALTHY_SERVICES || '';
            const title = `🚨 Health check failed${unhealthy ? ' — ' + unhealthy : ''} — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `Automated health check failed at ${new Date().toISOString()}.`,
              ``,
              unhealthy ? `**Unhealthy services:** ${unhealthy}` : `Frontend or API unreachable (no per-service detail).`,
              ``,
              `Workflow: ${context.workflow}`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Auto-closed when next successful run completes.`,
            ].join('\n');

            // Deduplicate — don't open a new issue if an open one already exists.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check-failure',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing — run ${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health-check-failure', 'incident'],
            });

      # Self-heal — when health comes back, close any open failure issue so the
      # tracker doesn't carry a stale alert (the previous version of this workflow
      # promised auto-close in the issue body but never implemented it; #42 sat
      # open for 4 days while health was green).
      - name: Auto-close health-check-failure issues on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check-failure',
              per_page: 50,
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Health check passed — auto-closing. Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
