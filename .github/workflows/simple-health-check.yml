name: Simple Health Check

on:
  workflow_dispatch:
  # SCHEDULE PAUSED 2026-04-30 — see smoke-tests.yml for context.
  # Health check hits /api/health which does SELECT NOW() on every call,
  # keeping Neon compute warm. At 30-min cadence this stacks with smoke
  # tests and contributes to compute-quota exhaustion. Re-enable after
  # Neon plan upgrade or cadence reduction (1hr+ is fine on Launch tier).
  # schedule:
  #   - cron: '*/30 * * * *'  # Every 30 minutes

permissions:
  contents: read
  # issues: write — the "Open GitHub issue on failure" step calls
  # github.rest.issues.create and .createComment. Without this scope those
  # 403 with "Resource not accessible by integration" on every failure,
  # silently defeating the alerting-with-teeth design.
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend
        id: frontend
        run: |
          if curl -f https://pitchey-5o8.pages.dev/ > /dev/null 2>&1; then
            echo "✅ Frontend is healthy"
          else
            echo "❌ Frontend is down"
            exit 1
          fi

      - name: Check API
        id: api
        run: |
          if curl -f https://pitchey-api-prod.ndlovucavelle.workers.dev/api/health > /dev/null 2>&1; then
            echo "✅ API is healthy"
          else
            echo "❌ API is down"
            exit 1
          fi

      # Red must have teeth — the previous version of this workflow failed silently,
      # with "failure surfaces in the Actions tab eventually" as the only escalation path.
      # Now: Slack on failure if SLACK_WEBHOOK is configured, GitHub issue as fallback.
      - name: Slack alert on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"🚨 Pitchey health check failed — run ${{ github.run_id }}. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_WEBHOOK"

      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Health check failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `Automated health check failed at ${new Date().toISOString()}.`,
              ``,
              `Workflow: ${context.workflow}`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Auto-closed when next successful run completes.`,
            ].join('\n');

            // Deduplicate — don't open a new issue if an open one already exists.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check-failure',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing — run ${context.runId}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health-check-failure', 'incident'],
            });

      # Self-heal — when health comes back, close any open failure issue so the
      # tracker doesn't carry a stale alert (the previous version of this workflow
      # promised auto-close in the issue body but never implemented it; #42 sat
      # open for 4 days while health was green).
      - name: Auto-close health-check-failure issues on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check-failure',
              per_page: 50,
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Health check passed — auto-closing. Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
