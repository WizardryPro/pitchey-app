name: Observability Error Sweep

# Daily query of Cloudflare Workers Observability for production error patterns,
# so we catch real bugs (schema drift, crashes, broken handlers) from the logs
# instead of manually click-testing every portal. Surfaces only NEW/non-transient
# errors via the same Slack + GitHub-issue alerting as simple-health-check.yml.
#
# Built 2026-05-30 after the logs caught: notification-queue lpop crash,
# document_favorites missing table, etc. See docs/launch-bug-and-stub-remediation-2026-05-30.md.

on:
  workflow_dispatch: {}          # manual run (use this to verify parsing first)
  schedule:
    - cron: '0 8 * * *'          # 08:00 UTC daily

permissions:
  contents: read
  issues: write                  # create/comment the obs-error issue

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Query Cloudflare Observability + alert on new errors
        uses: actions/github-script@v7
        env:
          # Prefer a dedicated read-only token (Account Analytics: Read). Falls back to
          # the deploy token if that's been granted the scope instead.
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_OBS_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        with:
          script: |
            const SERVICE = 'pitchey-api-prod';
            // Known-transient / expected noise — substring match, case-insensitive.
            const IGNORE = [
              'network connection lost',
              '[turnstile] verify failed',
              '[turnstile] missing token',
              'worker initialization error',
            ];

            const now = Date.now();
            const from = now - 24 * 60 * 60 * 1000;

            const body = {
              queryId: 'obs-error-sweep',
              view: 'calculations',
              limit: 100,
              dry: false,
              parameters: {
                datasets: ['cloudflare-workers'],
                filters: [
                  { key: '$metadata.service', operation: 'eq', type: 'string', value: SERVICE },
                  { key: '$metadata.level',   operation: 'eq', type: 'string', value: 'error' },
                ],
                calculations: [{ operator: 'count', alias: 'cnt' }],
                groupBys: [{ type: 'string', value: '$metadata.message' }],
                orderBy: { value: 'cnt', order: 'desc' },
              },
              // CF observability telemetry query expects epoch-ms timeframes.
              timeframe: { from, to: now },
            };

            const url = `https://api.cloudflare.com/client/v4/accounts/${process.env.CF_ACCOUNT_ID}/workers/observability/telemetry/query`;

            // Cloudflare's API throws transient 5xx/429s (502 Bad Gateway, 500, rate-limit)
            // that have nothing to do with our app. Retry with exponential backoff so a
            // single hiccup doesn't fail the sweep and fire a false-alarm issue/Slack page.
            const sleep = (ms) => new Promise(r => setTimeout(r, ms));
            const MAX_ATTEMPTS = 4;
            let res, text;
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              try {
                res = await fetch(url, {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.CF_API_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify(body),
                });
                text = await res.text();
                console.log(`HTTP ${res.status} (attempt ${attempt}/${MAX_ATTEMPTS})`);
                // Retry transient server errors / rate limits; succeed or fall through otherwise.
                if (res.status >= 500 || res.status === 429) {
                  if (attempt < MAX_ATTEMPTS) {
                    const backoff = 2000 * Math.pow(2, attempt - 1); // 2s, 4s, 8s
                    console.log(`Transient HTTP ${res.status} from Cloudflare — retrying in ${backoff}ms`);
                    await sleep(backoff);
                    continue;
                  }
                }
                break;
              } catch (e) {
                // Network-level failure (DNS, connection reset) — also transient.
                console.log(`fetch threw on attempt ${attempt}/${MAX_ATTEMPTS}: ${e.message}`);
                if (attempt < MAX_ATTEMPTS) {
                  const backoff = 2000 * Math.pow(2, attempt - 1);
                  await sleep(backoff);
                  continue;
                }
                core.setFailed(`Cloudflare Observability query failed after ${MAX_ATTEMPTS} attempts: ${e.message}`);
                return;
              }
            }

            // Log the raw response — used to verify/repair parsing on the first run.
            console.log(text.slice(0, 4000));
            if (!res.ok) {
              core.setFailed(`Cloudflare Observability query failed: HTTP ${res.status} (after ${MAX_ATTEMPTS} attempts)`);
              return;
            }

            let json;
            try { json = JSON.parse(text); } catch (e) { core.setFailed('Non-JSON response'); return; }

            // Defensive extraction of [{message, count}] across plausible shapes.
            const rows = [];
            const pushRow = (message, count) => {
              if (message == null) return;
              const n = Number(count);
              if (!Number.isFinite(n) || n <= 0) return;
              rows.push({ message: String(message), count: n });
            };
            const calcs = json?.result?.calculations ?? json?.result?.[0]?.calculations ?? [];
            for (const calc of (Array.isArray(calcs) ? calcs : [])) {
              const aggs = calc?.aggregates ?? calc?.data ?? calc?.groups ?? [];
              for (const a of (Array.isArray(aggs) ? aggs : [])) {
                // group label can live in several places depending on API version
                let label =
                  a?.group?.['$metadata.message'] ??
                  (Array.isArray(a?.groups) ? a.groups.find(g => /message/i.test(g?.key))?.value : undefined) ??
                  a?.['$metadata.message'] ??
                  a?.key ?? a?.dimensions?.['$metadata.message'];
                const value = a?.value ?? a?.cnt ?? a?.count ?? a?.aggregate;
                pushRow(label, value);
              }
            }

            if (rows.length === 0) {
              console.log('No grouped error rows parsed (either clean, or response shape changed — check the raw log above).');
            }

            const real = rows.filter(r => !IGNORE.some(ig => r.message.toLowerCase().includes(ig)));

            if (real.length === 0) {
              console.log('✅ clean — only known-transient/expected errors in the last 24h.');
              return;
            }

            const today = new Date().toISOString().slice(0, 10);
            const lines = real.slice(0, 25).map(r => `- \`${r.count}\` × ${r.message.replace(/`/g, "'").slice(0, 200)}`);
            const issueBody = [
              `Cloudflare Observability caught **${real.length}** non-transient error pattern(s) on \`${SERVICE}\` in the last 24h:`,
              '',
              ...lines,
              '',
              `Filtered out as known-transient: ${IGNORE.join(', ')}.`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            // Slack (best-effort)
            if (process.env.SLACK_WEBHOOK) {
              try {
                await fetch(process.env.SLACK_WEBHOOK, {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ text: `🔎 Obs sweep: ${real.length} new error pattern(s) on ${SERVICE} (top: ${real[0].count}× ${real[0].message.slice(0,120)})` }),
                });
              } catch (e) { console.log('Slack post failed (non-fatal):', e.message); }
            }

            // Dedup GitHub issue by label
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'obs-error', per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body: `${today} sweep:\n\n${issueBody}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🔎 Observability errors — ${today}`,
                body: issueBody, labels: ['obs-error', 'incident'],
              });
            }
