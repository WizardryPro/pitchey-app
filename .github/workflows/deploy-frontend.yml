name: Deploy Frontend to Cloudflare Pages

# Frontend auto-deployer (single source of truth for prod frontend).
#
# Correction (2026-06-01): the Pages project has NO Git integration
# (`pages projects get` → source: null; every deployment is trigger=ad_hoc, i.e.
# a wrangler CLI upload). An earlier assumption that CF Git integration auto-built
# on push was wrong, and on that false premise #145 reduced this to
# workflow_dispatch-only — which left the frontend with NO auto-deploy at all.
# Restored to push-on-main. This `wrangler pages deploy` is the only thing that
# ships the frontend; ci-cd.yml's deploy-production (the other pages-deploy) stays
# disabled, so there's exactly one auto-deployer, no race.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: # manual trigger

env:
  NODE_VERSION: '22' # wrangler >=4 requires Node >=22

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: frontend
        run: npm run build
        env:
          # VITE_API_URL must be empty for same-origin requests via Pages Functions proxy
          # The proxy at functions/api/[[path]].ts forwards /api/* to the Worker
          # Setting this to the Worker URL would bypass the proxy and break cookies
          VITE_API_URL: ''
          VITE_WS_URL: 'wss://pitchey-api-prod.ndlovucavelle.workers.dev'
          VITE_DISABLE_WEBSOCKET: 'false'
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN || 'https://fd5664ae577039ccb7cce31e91f54533@o4510137537396736.ingest.de.sentry.io/4510138308755536' }}
          # Commit SHA becomes the Sentry `release` + the /debug "Client build" so a
          # user's screenshot/events identify exactly which deploy they're on.
          VITE_APP_VERSION: ${{ github.sha }}
          # Source-map upload to Sentry (de-minifies frontend stack traces). The
          # vite plugin only runs when SENTRY_AUTH_TOKEN is set; if the secret is
          # absent it's a clean no-op (build still succeeds, traces stay minified).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          NODE_ENV: production

      - name: 🧹 Strip source maps from the public bundle
        # The build step already uploaded them to Sentry (debug IDs). Remove the
        # .map files before the public deploy so source isn't fetchable from
        # pitchey-5o8.pages.dev. Deterministic — doesn't rely on the vite plugin's
        # filesToDeleteAfterUpload glob (which didn't fire). No-op if none exist.
        working-directory: frontend
        run: find dist -name '*.map' -type f -delete -print | wc -l | xargs echo "stripped source maps:"

      - name: 🚀 Deploy to Cloudflare Pages (using Wrangler)
        working-directory: frontend
        run: |
          npx wrangler pages deploy dist \
            --project-name=pitchey \
            --branch="${{ github.ref_name }}" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${COMMIT_MSG}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: ✅ Deployment Complete
        run: |
          echo "✅ Frontend deployed successfully!"
          echo "🌐 Production URL: https://pitchey-5o8.pages.dev"
          echo "🌐 Pages Project: pitchey"
          echo "🔄 Deployment ID: ${{ github.sha }}"
          echo ""
          echo "The deployment may take 1-2 minutes to propagate globally."
          echo "Note: Individual deployments are available at https://[deployment-id].pitchey-5o8.pages.dev"