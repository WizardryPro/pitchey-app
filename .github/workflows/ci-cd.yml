name: 🚀 Pitchey Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily health checks at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '22'  # wrangler >=4 requires Node >=22 (see deploy-frontend.yml)
  FRONTEND_DIR: './frontend'
  WORKER_DIR: './src'
  
jobs:
  # =================================================================
  # SECURITY & CODE QUALITY CHECKS
  # =================================================================
  security-scan:
    name: 🔒 Security & Quality Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run security scan
        run: |
          if [ -f "scripts/security-scan.sh" ]; then
            chmod +x scripts/security-scan.sh
            ./scripts/security-scan.sh
          else
            echo "⚠️ Security scan script not found"
          fi

      - name: 🔍 Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential secrets..."
          grep -r -E "(api_key|secret|password|token)" --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" . || true
          echo "✅ Secret scan completed"

  # =================================================================
  # FRONTEND BUILD & TEST
  # =================================================================
  frontend-test:
    name: 🎨 Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.FRONTEND_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        run: |
          npm ci --no-audit --prefer-offline
          echo "✅ Dependencies installed"
          npx eslint --version || echo "⚠️ ESLint not found after install"

      - name: 🧹 Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: 🔧 Type checking
        run: npm run type-check

      # Unit tests RUN and GATE in CI. The stale-mock backlog (82 failures that
      # accumulated while tests never executed here) was burned down to 0, so this
      # step now blocks on any failure — keeping mocks honest with the real API.
      - name: 🧪 Run unit tests
        run: npm run test:run

      - name: 🏗️ Build frontend
        run: npm run build
        env:
          VITE_API_URL: ''
          VITE_WS_URL: wss://pitchey-api-prod.ndlovucavelle.workers.dev
          VITE_DISABLE_WEBSOCKET: 'false'

      - name: 📊 Bundle size analysis
        run: |
          echo "📊 Frontend build size:"
          du -sh dist/
          ls -la dist/assets/ || echo "No assets directory"

  # =================================================================
  # WORKER BUILD & TEST
  # =================================================================
  worker-test:
    name: ⚡ Worker Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Wrangler
        run: npm install -g wrangler@latest

      - name: 📦 Install dependencies
        run: npm ci
        
      - name: 🏗️ Build Worker
        run: npm run build:worker

      - name: 🧪 Worker syntax validation
        run: |
          echo "🔍 Validating Worker syntax..."
          node -c dist/worker.js || echo "⚠️ Worker validation failed"

      - name: 🪝 Catch-swallow gate (untagged residue)
        # Blocks regression: every new `.catch(() => …)` site must carry an
        # A/B/C tag (`// fire-and-forget` | `// TODO(catch-swallow): bucket-B`
        # | `// TODO(catch-swallow)`). Default scope excludes worker-integrated.ts
        # — that file's enforcement is a follow-up after PR #87 + #88 land.
        # See docs/catch-swallow-prep-2026-05-05.md and
        # docs/catch-swallow-audit-2026-04-17.md.
        run: node scripts/catch-swallow-gate.mjs --threshold 0 --list

  # =================================================================
  # DATABASE TESTS
  # =================================================================
  database-test:
    name: 🗄️ Database Schema Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Schema validation
        run: |
          echo "🔍 Validating database schema files..."
          find . -name "*.sql" -type f -exec echo "📄 Found SQL file: {}" \;
          
          if [ -f "scripts/fix-schema-alignment.sql" ]; then
            echo "✅ Schema alignment file exists"
          else
            echo "⚠️ Schema alignment file missing"
          fi

  # =================================================================
  # PRODUCTION DEPLOYMENT
  # =================================================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    # DISABLED — redundant + hazardous. Frontend is owned by Cloudflare Pages' Git
    # integration; the worker is deployed manually via deploy-production.yml
    # (workflow_dispatch). This job also re-synced Worker secrets from GitHub secrets
    # on every push, which would silently overwrite prod secrets with anything stale
    # (e.g. a rotated NEON URL → outage). Kept in-file (not deleted) so the manual
    # deploy reference stays visible. Re-enable only behind a deliberate decision.
    if: false && github.ref == 'refs/heads/main'
    needs: [security-scan, frontend-test, worker-test, database-test]
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔒 Deploy preflight (migrations + secrets)
        uses: ./.github/actions/deploy-preflight
        with:
          database-url: ${{ secrets.NEON_DATABASE_URL }}
          required-secrets: |
            NEON_DATABASE_URL=${{ secrets.NEON_DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            AXIOM_TOKEN=${{ secrets.AXIOM_TOKEN }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: 🏗️ Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ''
          VITE_WS_URL: wss://pitchey-api-prod.ndlovucavelle.workers.dev
          VITE_DISABLE_WEBSOCKET: 'false'

      - name: 🚀 Deploy Worker to production
        run: |
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: 🔐 Sync Worker secrets
        run: |
          echo "${{ secrets.NEON_DATABASE_URL }}" | npx wrangler secret put DATABASE_URL
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
          echo "${{ secrets.UPSTASH_REDIS_REST_URL }}" | npx wrangler secret put UPSTASH_REDIS_REST_URL
          echo "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" | npx wrangler secret put UPSTASH_REDIS_REST_TOKEN
          echo "${{ secrets.AXIOM_TOKEN }}" | npx wrangler secret put AXIOM_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 🚀 Deploy Frontend to production
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npx wrangler pages deploy dist/ --project-name=pitchey
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: 📊 Upload source maps to Sentry
        continue-on-error: true
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "⚠️ SENTRY_AUTH_TOKEN not configured, skipping source map upload"
            exit 0
          fi
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases files "${{ github.sha }}" upload-sourcemaps frontend/dist --url-prefix '~/'
          npx @sentry/cli releases finalize "${{ github.sha }}"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  # =================================================================
  # E2E TESTS (Playwright)
  # =================================================================
  e2e-test:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [deploy-production]
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.FRONTEND_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run E2E tests against production
        run: npx playwright test --project=critical-user-journeys --project=portal-functionality
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://pitchey-5o8.pages.dev

      - name: 📊 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ${{ env.FRONTEND_DIR }}/test-results/
          retention-days: 14

  # =================================================================
  # DAILY HEALTH MONITORING
  # =================================================================
  health-monitor:
    name: 🏥 Daily Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏥 Run comprehensive health check
        run: |
          echo "🏥 Running daily health monitoring..."
          
          API_URL="https://pitchey-api-prod.ndlovucavelle.workers.dev"
          FRONTEND_URL="https://pitchey-5o8.pages.dev"
          
          # Test API health
          echo "🔍 Testing API health..."
          curl -f "$API_URL/api/health" || echo "❌ API health check failed"
          
          # Test Frontend availability
          echo "🔍 Testing Frontend availability..."
          curl -f -I "$FRONTEND_URL" || echo "❌ Frontend health check failed"
          
          # Test key endpoints
          echo "🔍 Testing key endpoints..."
          curl -f "$API_URL/api/pitches?limit=1" || echo "❌ Pitches endpoint failed"
          
          echo "✅ Health monitoring completed"

      - name: 🔍 Security monitoring
        run: |
          echo "🔒 Running security monitoring..."
          
          # Check for security headers
          API_URL="https://pitchey-api-prod.ndlovucavelle.workers.dev"
          
          echo "🔍 Checking security headers..."
          curl -I "$API_URL/api/health" | grep -E "(X-Frame-Options|Content-Security-Policy|X-Content-Type-Options)" || echo "⚠️ Some security headers missing"
          
          echo "✅ Security monitoring completed"

  # =================================================================
  # CLEANUP & NOTIFICATIONS
  # =================================================================
  cleanup:
    name: 🧹 Cleanup & Notify
    runs-on: ubuntu-latest
    if: always()
    needs: [security-scan, frontend-test, worker-test, database-test, deploy-production]

    steps:
      - name: 📊 Job status summary
        run: |
          echo "📊 CI/CD Pipeline Summary:"
          echo "================================"
          echo "🔒 Security Scan: ${{ needs.security-scan.result }}"
          echo "🎨 Frontend Tests: ${{ needs.frontend-test.result }}"
          echo "⚡ Worker Tests: ${{ needs.worker-test.result }}"
          echo "🗄️ Database Tests: ${{ needs.database-test.result }}"
          echo "🚀 Production Deploy: ${{ needs.deploy-production.result }}"
          echo "================================"

      - name: 🚨 Failure notification
        if: failure()
        run: |
          echo "🚨 Pipeline failed! Check the logs above for details."
          echo "📧 In production, this would send notifications to the team."